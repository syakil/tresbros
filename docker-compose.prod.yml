version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: tresbros_postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: tresbros
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped

  backend:
    # Ganti <DOCKER_USERNAME> dengan username Docker Hub Anda yang sebenarnya
    image: <DOCKER_USERNAME>/tresbros-backend:latest
    container_name: tresbros_backend
    environment:
      - ConnectionStrings__DefaultConnection=Host=postgres;Database=tresbros;Username=postgres;Password=password
    ports:
      - "5052:8080"
    depends_on:
      - postgres
    restart: unless-stopped

  frontend:
    # Ganti <DOCKER_USERNAME> dengan username Docker Hub Anda yang sebenarnya
    image: <DOCKER_USERNAME>/tresbros-frontend:latest
    container_name: tresbros_frontend
    environment:
      - BACKEND_URL=http://backend:8080
    ports:
      - "3000:3000"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  pgdata:
