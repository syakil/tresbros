version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: tresbros_postgres
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME:-tresbros}
    ports:
      - "127.0.0.1:5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped

  backend:
    # Ganti <DOCKER_USERNAME> dengan username Docker Hub Anda yang sebenarnya
    image: syakil/tresbros-backend:latest
    container_name: tresbros_backend
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ConnectionStrings__DefaultConnection=Host=postgres;Database=${DB_NAME:-tresbros};Username=${DB_USER:-postgres};Password=${DB_PASSWORD}
      - Sentry__Dsn=${SENTRY_DSN}
    ports:
      - "5052:8080"
    depends_on:
      - postgres
    restart: unless-stopped

  frontend:
    # Ganti <DOCKER_USERNAME> dengan username Docker Hub Anda yang sebenarnya
    image: syakil/tresbros-frontend:latest
    container_name: tresbros_frontend
    environment:
      - BACKEND_URL=http://backend:8080
      - NEXT_PUBLIC_SENTRY_DSN=${NEXT_PUBLIC_SENTRY_DSN}
      - SENTRY_DSN=${NEXT_PUBLIC_SENTRY_DSN}
    ports:
      - "3005:3000"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  pgdata:
