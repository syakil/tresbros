name: CI/CD Pipeline

on:
  push:
    branches:
      - main
    # Opsional: Jika Anda hanya ingin men-trigger build saat ada perubahan di folder terkait
    # paths:
    #   - 'frontend/**'
    #   - 'backend/**'
    #   - 'docker-compose.yml'

jobs:
  build-and-push:
    name: Build & Push Docker Images
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
          
      # Opsional: Set up Docker Buildx (untuk caching & multi-architecture)
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # BUILD & PUSH FRONTEND
      - name: Build and Push Frontend Image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/tresbros-frontend:latest
          cache-from: type=registry,ref=${{ secrets.DOCKER_USERNAME }}/tresbros-frontend:buildcache
          cache-to: type=registry,ref=${{ secrets.DOCKER_USERNAME }}/tresbros-frontend:buildcache,mode=max

      # BUILD & PUSH BACKEND
      - name: Build and Push Backend Image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/tresbros-backend:latest
          cache-from: type=registry,ref=${{ secrets.DOCKER_USERNAME }}/tresbros-backend:buildcache
          cache-to: type=registry,ref=${{ secrets.DOCKER_USERNAME }}/tresbros-backend:buildcache,mode=max

  deploy:
    name: Deploy to VPS
    needs: build-and-push
    runs-on: ubuntu-latest
    
    steps:
      - name: Execute SSH Commands on VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT }} # Biasanya 22
          script: |
            # Pindah ke direktori proyek di server
            cd /opt/tresbros
            
            # Tarik images terbaru dari Docker Hub
            docker-compose pull
            
            # Restart container dengan image baru (tanpa downtime lama)
            docker-compose up -d
            
            # Opsional: Bersihkan image lama yang tidak terpakai
            docker image prune -f
