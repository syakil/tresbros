name: CI/CD Pipeline

on:
  push:
    branches:
      - main
    paths-ignore:
      - 'mobile/**'

jobs:
  build-and-push:
    name: Build & Push Docker Images
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
          
      # Opsional: Set up Docker Buildx (untuk caching & multi-architecture)
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # BUILD & PUSH FRONTEND
      - name: Build and Push Frontend Image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/tresbros-frontend:latest
          cache-from: type=registry,ref=${{ secrets.DOCKER_USERNAME }}/tresbros-frontend:buildcache
          cache-to: type=registry,ref=${{ secrets.DOCKER_USERNAME }}/tresbros-frontend:buildcache,mode=max
          build-args: |
            NEXT_PUBLIC_SENTRY_DSN=${{ secrets.NEXT_PUBLIC_SENTRY_DSN }}
            SENTRY_AUTH_TOKEN=${{ secrets.SENTRY_AUTH_TOKEN }}

      # BUILD & PUSH BACKEND
      - name: Build and Push Backend Image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/tresbros-backend:latest
          cache-from: type=registry,ref=${{ secrets.DOCKER_USERNAME }}/tresbros-backend:buildcache
          cache-to: type=registry,ref=${{ secrets.DOCKER_USERNAME }}/tresbros-backend:buildcache,mode=max

  deploy:
    name: Deploy to VPS
    needs: build-and-push
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Copy docker-compose to VPS
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT }}
          source: "docker-compose.prod.yml"
          target: "~/tresbros"

      - name: Execute SSH Commands on VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT }}
          script: |
            # Menghentikan script jika ada perintah yang gagal
            set -e
            
            # Buat direktori jika belum ada
            mkdir -p ~/tresbros
            
            # Pindah ke direktori proyek di server
            cd ~/tresbros
            
            # Rename agar dikenali oleh docker-compose
            mv docker-compose.prod.yml docker-compose.yml
            
            # Buat file .env dari GitHub Secrets (ini yang menjembatani rahasia dari GitHub ke Server Anda)
            echo "DB_PASSWORD=${{ secrets.PROD_DB_PASSWORD }}" > .env
            echo "SENTRY_DSN=${{ secrets.SENTRY_DSN }}" >> .env
            echo "NEXT_PUBLIC_SENTRY_DSN=${{ secrets.NEXT_PUBLIC_SENTRY_DSN }}" >> .env
            
            # Tarik images terbaru dari Docker Hub
            docker compose pull
            
            # Restart container dengan image baru
            docker compose up -d
            
            # Bersihkan image lama
            docker image prune -f
