<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tresbros Mobile POS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        display: ['Outfit', 'sans-serif'],
                    },
                    colors: {
                        brand: {
                            dark: '#1c140d',
                            warm: '#D4A373',
                            sage: '#CCD5AE',
                            cream: '#FAEDCD',
                            olive: '#E9EDC9',
                        }
                    }
                }
            }
        }
    </script>
    <style>
        /* Hide scrollbar for Chrome, Safari and Opera */
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }
        /* Hide scrollbar for IE, Edge and Firefox */
        .no-scrollbar {
            -ms-overflow-style: none;  /* IE and Edge */
            scrollbar-width: none;  /* Firefox */
        }
        
        .glass-effect {
            background: rgba(28, 20, 13, 0.85);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-top: 1px solid rgba(255, 255, 255, 0.1);
        }
    </style>
</head>
<body class="bg-brand-dark text-brand-cream font-sans min-h-[100dvh] flex flex-col selection:bg-brand-warm selection:text-brand-dark relative">
    
    <!-- Top Bar -->
    <header class="flex items-center justify-between px-4 py-3 bg-brand-dark z-20 border-b border-white/5 shadow-sm">
        <div class="flex items-center gap-3">
            <div class="w-10 h-10 rounded-full bg-brand-warm/20 flex items-center justify-center border border-brand-warm/30">
                <i data-lucide="coffee" class="w-5 h-5 text-brand-warm"></i>
            </div>
            <div>
                <h1 class="font-display font-bold text-lg leading-tight">Tresbros</h1>
                <p class="text-xs text-brand-sage/70">Kasir Utama</p>
            </div>
        </div>
        <button class="p-2 rounded-xl bg-white/5 hover:bg-white/10 active:scale-95 transition-all">
            <i data-lucide="menu" class="w-5 h-5 text-brand-sage"></i>
        </button>
    </header>

    <!-- Search & Categories -->
    <div class="px-4 py-3 bg-brand-dark z-10 border-b border-white/5">
        <!-- Search -->
        <div class="relative mb-3">
            <i data-lucide="search" class="absolute left-3 top-1/2 -translate-y-1/2 w-4 h-4 text-brand-sage/50"></i>
            <input type="text" placeholder="Cari menu..." class="w-full bg-white/5 border border-white/10 rounded-xl py-2.5 pl-10 pr-4 text-sm text-brand-cream placeholder:text-brand-sage/40 focus:outline-none focus:border-brand-warm focus:ring-1 focus:ring-brand-warm/50 transition-all">
        </div>

        <!-- Categories -->
        <div class="flex gap-2 overflow-x-auto no-scrollbar pb-1">
            <button class="whitespace-nowrap px-4 py-2 bg-brand-warm text-brand-dark font-bold rounded-xl text-sm shadow-[0_0_15px_rgba(212,163,115,0.3)] transition-all">All Menu</button>
            <button class="whitespace-nowrap px-4 py-2 bg-white/5 text-brand-sage hover:bg-white/10 font-medium rounded-xl text-sm border border-white/5 transition-all">Coffee</button>
            <button class="whitespace-nowrap px-4 py-2 bg-white/5 text-brand-sage hover:bg-white/10 font-medium rounded-xl text-sm border border-white/5 transition-all">Non-Coffee</button>
            <button class="whitespace-nowrap px-4 py-2 bg-white/5 text-brand-sage hover:bg-white/10 font-medium rounded-xl text-sm border border-white/5 transition-all">Pastry</button>
            <button class="whitespace-nowrap px-4 py-2 bg-white/5 text-brand-sage hover:bg-white/10 font-medium rounded-xl text-sm border border-white/5 transition-all">Snacks</button>
        </div>
    </div>

    <!-- Product Grid (Scrollable) -->
    <main class="flex-1 px-4 py-4 pb-32">
        <div class="grid grid-cols-2 landscape:grid-cols-3 md:grid-cols-4 gap-4">
            
            <!-- Item 1 -->
            <div class="bg-brand-olive/5 border border-brand-olive/20 rounded-2xl p-4 flex flex-col active:scale-95 transition-all cursor-pointer group hover:border-brand-olive/50 hover:bg-brand-olive/10 shadow-sm" onclick="addToCart('Es Kopi Susu Aren', 25000)">
                <div class="w-10 h-10 bg-black/30 group-hover:bg-brand-olive rounded-full flex items-center justify-center mb-4 transition-colors">
                    <i data-lucide="coffee" class="w-5 h-5 text-brand-cream group-hover:text-brand-dark transition-colors"></i>
                </div>
                <h3 class="font-display font-medium text-[15px] line-clamp-2 leading-tight text-brand-cream">Es Kopi Susu Aren</h3>
                <div class="mt-auto pt-4 flex items-center justify-between">
                    <span class="font-display font-semibold text-brand-warm text-lg">Rp 25.000</span>
                    <div class="w-7 h-7 rounded-full bg-brand-warm/10 flex items-center justify-center text-brand-warm border border-brand-warm/30 group-hover:bg-brand-warm group-hover:text-brand-dark transition-colors">
                        <i data-lucide="plus" class="w-4 h-4"></i>
                    </div>
                </div>
            </div>

            <!-- Item 2 -->
            <div class="bg-brand-olive/5 border border-brand-olive/20 rounded-2xl p-4 flex flex-col active:scale-95 transition-all cursor-pointer group hover:border-brand-olive/50 hover:bg-brand-olive/10 shadow-sm" onclick="addToCart('Caramel Macchiato', 35000)">
                <div class="w-10 h-10 bg-black/30 group-hover:bg-brand-olive rounded-full flex items-center justify-center mb-4 transition-colors">
                    <i data-lucide="coffee" class="w-5 h-5 text-brand-cream group-hover:text-brand-dark transition-colors"></i>
                </div>
                <h3 class="font-display font-medium text-[15px] line-clamp-2 leading-tight text-brand-cream">Caramel Macchiato</h3>
                <div class="mt-auto pt-4 flex items-center justify-between">
                    <span class="font-display font-semibold text-brand-warm text-lg">Rp 35.000</span>
                    <div class="w-7 h-7 rounded-full bg-brand-warm/10 flex items-center justify-center text-brand-warm border border-brand-warm/30 group-hover:bg-brand-warm group-hover:text-brand-dark transition-colors">
                        <i data-lucide="plus" class="w-4 h-4"></i>
                    </div>
                </div>
            </div>

            <!-- Item 3 -->
            <div class="bg-brand-olive/5 border border-brand-olive/20 rounded-2xl p-4 flex flex-col active:scale-95 transition-all cursor-pointer group hover:border-brand-olive/50 hover:bg-brand-olive/10 shadow-sm" onclick="addToCart('Matcha Latte Iced', 30000)">
                <div class="w-10 h-10 bg-black/30 group-hover:bg-brand-olive rounded-full flex items-center justify-center mb-4 transition-colors">
                    <i data-lucide="coffee" class="w-5 h-5 text-brand-cream group-hover:text-brand-dark transition-colors"></i>
                </div>
                <h3 class="font-display font-medium text-[15px] line-clamp-2 leading-tight text-brand-cream">Matcha Latte Iced</h3>
                <div class="mt-auto pt-4 flex items-center justify-between">
                    <span class="font-display font-semibold text-brand-warm text-lg">Rp 30.000</span>
                    <div class="w-7 h-7 rounded-full bg-brand-warm/10 flex items-center justify-center text-brand-warm border border-brand-warm/30 group-hover:bg-brand-warm group-hover:text-brand-dark transition-colors">
                        <i data-lucide="plus" class="w-4 h-4"></i>
                    </div>
                </div>
            </div>

            <!-- Item 4 -->
            <div class="bg-brand-olive/5 border border-brand-olive/20 rounded-2xl p-4 flex flex-col active:scale-95 transition-all cursor-pointer group hover:border-brand-olive/50 hover:bg-brand-olive/10 shadow-sm relative overflow-hidden" onclick="addToCart('Butter Croissant', 22000)">
                <!-- Simulated Out of Stock overlay on the 4th item to match design expectation -->
                <div class="absolute inset-0 bg-red-900/40 z-10 flex items-center justify-center backdrop-blur-[2px] opacity-0"></div>
                <div class="w-10 h-10 bg-black/30 group-hover:bg-brand-olive rounded-full flex items-center justify-center mb-4 transition-colors relative z-0">
                    <i data-lucide="pizza" class="w-5 h-5 text-brand-cream group-hover:text-brand-dark transition-colors"></i>
                </div>
                <h3 class="font-display font-medium text-[15px] line-clamp-2 leading-tight text-brand-cream relative z-0">Butter Croissant</h3>
                <div class="mt-auto pt-4 flex items-center justify-between relative z-0">
                    <span class="font-display font-semibold text-brand-warm text-lg">Rp 22.000</span>
                    <div class="w-7 h-7 rounded-full bg-brand-warm/10 flex items-center justify-center text-brand-warm border border-brand-warm/30 group-hover:bg-brand-warm group-hover:text-brand-dark transition-colors">
                        <i data-lucide="plus" class="w-4 h-4"></i>
                    </div>
                </div>
            </div>
            
        </div>
    </main>

    <!-- Bottom Cart Bar (Floating) -->
    <div class="fixed bottom-0 left-0 right-0 p-4 pb-6 z-30 glass-effect rounded-t-[32px] shadow-[0_-10px_40px_rgba(0,0,0,0.5)] transform translate-y-0 transition-transform duration-300">
        <button onclick="toggleCart()" class="w-full flex items-center justify-between bg-brand-warm text-brand-dark p-3 landscape:p-2 md:p-4 rounded-2xl shadow-[0_10px_25px_rgba(212,163,115,0.3)] active:scale-[0.98] transition-all">
            <div class="flex items-center gap-3">
                <div class="relative">
                    <i data-lucide="shopping-bag" class="w-6 h-6"></i>
                    <span id="cart-badge" class="absolute -top-2 -right-2 bg-red-500 text-white text-[10px] font-bold w-5 h-5 flex items-center justify-center rounded-full border-2 border-brand-warm hidden">0</span>
                </div>
                <div class="text-left">
                    <p class="text-xs font-bold opacity-80">Total Pesanan</p>
                    <p id="cart-total" class="font-display font-bold text-lg leading-none mt-0.5">Rp 0</p>
                </div>
            </div>
            <div class="flex items-center gap-2 font-bold uppercase tracking-wider text-sm bg-brand-dark/10 px-4 py-2 rounded-xl">
                Lanjut <i data-lucide="arrow-right" class="w-4 h-4"></i>
            </div>
        </button>
    </div>

    <!-- Cart Bottom Sheet (Hidden by default) -->
    <div id="cart-sheet" class="fixed inset-0 z-50 flex flex-col justify-end pointer-events-none">
        <!-- Overlay -->
        <div id="cart-overlay" class="absolute inset-0 bg-black/60 backdrop-blur-sm opacity-0 transition-opacity duration-300 pointer-events-auto hidden" onclick="toggleCart()"></div>
        
        <!-- Sheet Content -->
        <!-- Sheet Content -->
        <div id="cart-content" class="bg-brand-dark border-t border-white/10 rounded-t-[32px] w-full h-[95dvh] md:h-[85vh] flex flex-col landscape:flex-row transform translate-y-full transition-transform duration-300 pointer-events-auto relative z-10 shadow-[0_-20px_50px_rgba(0,0,0,0.8)] overflow-hidden">
            
            <!-- Handle -->
            <div class="w-full flex justify-center py-3 cursor-pointer absolute top-0 left-0 right-0 z-20 landscape:hidden" onclick="toggleCart()">
                <div class="w-12 h-1.5 bg-white/20 rounded-full"></div>
            </div>

            <!-- Left Side (Header & Items) -->
            <div class="flex-1 flex flex-col pt-8 landscape:pt-4 min-w-0">
                <!-- Header -->
                <div class="px-6 pb-2 md:pb-4 flex items-center justify-between border-b border-white/5 shrink-0">
                    <div>
                        <h2 class="font-display font-bold text-xl">Keranjang Anda</h2>
                        <p class="text-xs text-brand-sage/60 mt-1">Order #TB-1928</p>
                    </div>
                    <div class="flex items-center gap-2">
                        <button class="text-brand-sage/60 hover:text-red-400 font-medium text-sm flex items-center gap-1 bg-white/5 px-3 py-1.5 rounded-lg active:scale-95 transition-all" onclick="clearCart()">
                            <i data-lucide="trash-2" class="w-4 h-4"></i> Kosongkan
                        </button>
                        <!-- Close button for landscape -->
                        <button class="hidden landscape:flex text-brand-cream bg-white/10 p-1.5 rounded-lg hover:bg-white/20" onclick="toggleCart()">
                            <i data-lucide="x" class="w-5 h-5"></i>
                        </button>
                    </div>
                </div>

                <!-- Cart Items -->
                <div id="cart-items-container" class="flex-1 overflow-y-auto p-4 space-y-3 min-h-0">
                    <!-- Empty State (Shown initially) -->
                    <div id="empty-state" class="h-full flex flex-col items-center justify-center text-center opacity-50">
                        <i data-lucide="shopping-basket" class="w-16 h-16 mb-4 text-brand-sage"></i>
                        <p class="font-medium text-brand-sage">Belum ada pesanan</p>
                        <p class="text-xs text-brand-sage/60 mt-1">Pilih menu untuk mulai menambahkan</p>
                    </div>

                    <!-- Template item that will be injected via JS -->
                </div>
            </div>

            <!-- Footer Checkout (Right Side in Landscape) -->
            <div class="w-full landscape:w-[320px] landscape:border-l landscape:border-t-0 p-4 md:p-6 bg-black/40 border-t border-white/5 landscape:pb-4 pb-8 shrink-0 flex flex-col justify-end">
                <div class="flex justify-between items-center mb-2 md:mb-4 text-sm">
                    <span class="text-brand-sage">Subtotal</span>
                    <span id="subtotal-display" class="font-bold">Rp 0</span>
                </div>
                <div class="flex justify-between items-center mb-2 md:mb-4 text-sm">
                    <span class="text-brand-sage flex items-center gap-2">Pajak (10%) <i data-lucide="info" class="w-3 h-3 opacity-50"></i></span>
                    <span id="tax-display" class="font-bold">Rp 0</span>
                </div>
                
                <div class="border-t border-white/10 border-dashed my-2 md:my-4"></div>

                <div class="flex justify-between items-center mb-4 md:mb-6">
                    <span class="font-bold text-base md:text-lg text-brand-cream">Total Bayar</span>
                    <span id="grand-total-display" class="font-display font-bold text-xl md:text-2xl text-brand-warm">Rp 0</span>
                </div>

                <div class="grid grid-cols-2 gap-3">
                    <button class="py-3 md:py-4 border border-brand-warm/30 text-brand-warm font-bold rounded-2xl active:bg-brand-warm/10 transition-all flex items-center justify-center gap-2">
                        <i data-lucide="qr-code" class="w-5 h-5"></i> QRIS
                    </button>
                    <button class="py-3 md:py-4 bg-brand-warm text-brand-dark font-bold rounded-2xl shadow-[0_10px_20px_rgba(212,163,115,0.2)] active:scale-[0.98] transition-all flex items-center justify-center gap-2">
                        <i data-lucide="banknote" class="w-5 h-5"></i> Tunai
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script>
        // Initialize Icons
        lucide.createIcons();

        // App State
        let cart = [];
        let isCartOpen = false;

        const formatRupiah = (number) => {
            return new Intl.NumberFormat('id-ID', { style: 'currency', currency: 'IDR', minimumFractionDigits: 0 }).format(number);
        };

        const updateCartUI = () => {
            const totalQty = cart.reduce((sum, item) => sum + item.qty, 0);
            const subtotal = cart.reduce((sum, item) => sum + (item.price * item.qty), 0);
            const tax = subtotal * 0.1;
            const grandTotal = subtotal + tax;

            // Update Bottom Bar
            document.getElementById('cart-total').innerText = formatRupiah(subtotal);
            const badge = document.getElementById('cart-badge');
            if (totalQty > 0) {
                badge.innerText = totalQty;
                badge.classList.remove('hidden');
            } else {
                badge.classList.add('hidden');
            }

            // Update Bottom Sheet
            document.getElementById('subtotal-display').innerText = formatRupiah(subtotal);
            document.getElementById('tax-display').innerText = formatRupiah(tax);
            document.getElementById('grand-total-display').innerText = formatRupiah(grandTotal);

            // Update Cart Items List
            const container = document.getElementById('cart-items-container');
            const emptyState = document.getElementById('empty-state');
            
            if (cart.length === 0) {
                emptyState.style.display = 'flex';
                // Remove all items except empty state
                Array.from(container.children).forEach(child => {
                    if (child.id !== 'empty-state') child.remove();
                });
            } else {
                emptyState.style.display = 'none';
                // Clear existing
                Array.from(container.children).forEach(child => {
                    if (child.id !== 'empty-state') child.remove();
                });

                // Render new
                cart.forEach((item, index) => {
                    const itemEl = document.createElement('div');
                    itemEl.className = 'flex items-center gap-3 p-3 bg-white/5 border border-white/5 rounded-2xl animate-in fade-in slide-in-from-bottom-2 duration-300';
                    itemEl.innerHTML = `
                        <div class="flex-1">
                            <h4 class="font-display font-semibold text-sm">${item.name}</h4>
                            <p class="text-brand-warm font-bold text-sm">${formatRupiah(item.price)}</p>
                        </div>
                        <div class="flex items-center bg-black/40 rounded-xl p-1 border border-white/5">
                            <button onclick="updateQty(${index}, -1)" class="w-8 h-8 flex items-center justify-center rounded-lg active:bg-white/10 text-brand-sage"><i data-lucide="minus" class="w-4 h-4"></i></button>
                            <span class="w-8 text-center font-bold text-sm">${item.qty}</span>
                            <button onclick="updateQty(${index}, 1)" class="w-8 h-8 flex items-center justify-center rounded-lg bg-brand-warm/20 text-brand-warm active:bg-brand-warm/30"><i data-lucide="plus" class="w-4 h-4"></i></button>
                        </div>
                    `;
                    container.appendChild(itemEl);
                });
                lucide.createIcons();
            }
        };

        const addToCart = (name, price) => {
            const existing = cart.find(item => item.name === name);
            if (existing) {
                existing.qty += 1;
            } else {
                cart.push({ name, price, qty: 1 });
            }
            updateCartUI();

            // Trigger haptic feedback if available (mobile browsers)
            if (window.navigator && window.navigator.vibrate) {
                window.navigator.vibrate(50);
            }
        };

        const updateQty = (index, delta) => {
            cart[index].qty += delta;
            if (cart[index].qty <= 0) {
                cart.splice(index, 1);
            }
            updateCartUI();
        };

        const clearCart = () => {
            if(confirm('Kosongkan keranjang?')) {
                cart = [];
                updateCartUI();
                toggleCart(); // Close sheet
            }
        };

        const toggleCart = () => {
            const overlay = document.getElementById('cart-overlay');
            const content = document.getElementById('cart-content');
            
            isCartOpen = !isCartOpen;
            
            if (isCartOpen) {
                overlay.classList.remove('hidden');
                setTimeout(() => {
                    overlay.classList.remove('opacity-0');
                    content.classList.remove('translate-y-full');
                }, 10);
            } else {
                overlay.classList.add('opacity-0');
                content.classList.add('translate-y-full');
                setTimeout(() => {
                    overlay.classList.add('hidden');
                }, 300);
            }
        };
    </script>
</body>
</html>
